name: Send daily social studies question

on:
  schedule:
    # GitHub Actions cron is UTC. 08:00 UTC is 17:00 JST.
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run tests
        run: npm test
      - name: Send today's question
        run: npm run send
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
